name: Build & Publish p2 Repository

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [upstream-main-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger information
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            dbus-x11 \
            libgtk-3-0

      - name: Install Atlas license
        env:
          LICENSE_B64: ${{ secrets.ATLAS_LICENSE_B64 }}
          KEY_B64: ${{ secrets.ATLAS_LICENSE_KEY_B64 }}
          KEY_FILENAME: ${{ secrets.ATLAS_LICENSE_FILENAME }}
        run: |
          mkdir -p "$HOME/.ensoft/Atlas/license"
          echo "$LICENSE_B64" | base64 -d > "$HOME/.ensoft/Atlas/license/license"
          echo "$KEY_B64" | base64 -d > "$HOME/.ensoft/Atlas/license/$KEY_FILENAME"
          # required to prevent blocking Atlas dialog at first start of Eclipse
          touch "$HOME/.ensoft/Atlas/footprint"
          
      - name: Clone source repository
        env:
          TOKEN: ${{ secrets.REFD_CORE_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/Open-Universiteit-Refactoring-Diagnosis/refd-core.git source

      - name: Build repository
        working-directory: source
        env:
          NO_AT_BRIDGE: 1
          GDK_BACKEND: x11
        run: |
          dbus-run-session -- \
          xvfb-run \
          --auto-servernum \
          --server-args="-screen 0 1920x1080x24" \
          mvn clean verify
          
      - name: Prepare Pages content
        run: |
          mkdir -p pages/refd-core/repository
          cp -r source/nl.ou.refd.core.repository/target/repository/* pages/refd-core/repository/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

      - name: Show Eclipse log
        if: failure()
        run: |
          cat source/nl.ou.refd.core.tests/target/work/data/.metadata/.log || true
          
  deploy:
    needs: build
  
    permissions:
      pages: write
      id-token: write
  
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    runs-on: ubuntu-latest
  
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
