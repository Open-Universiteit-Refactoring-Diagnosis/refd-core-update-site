name: Build & Publish p2 Repository

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21

      - name: Install UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0

      - name: Install Atlas license
        env:
          LICENSE_B64: ${{ secrets.ATLAS_LICENSE_B64 }}
          KEY_B64: ${{ secrets.ATLAS_LICENSE_KEY_B64 }}
          KEY_FILENAME: ${{ secrets.ATLAS_LICENSE_FILENAME }}
        run: |
          mkdir -p "$HOME/.ensoft/Atlas/license"
          echo "$LICENSE_B64" | base64 -d > "$HOME/.ensoft/Atlas/license/license"
          echo "$KEY_B64" | base64 -d > "$HOME/.ensoft/Atlas/license/$KEY_FILENAME"
          
      - name: Build repository (from source repo)
        env:
          TOKEN: ${{ secrets.REFD_CORE_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/Open-Universiteit-Refactoring-Diagnosis/refd-core.git source
          cd source
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" mvn clean verify

      - name: Prepare docs folder
        run: |
          rm -rf docs
          mkdir -p docs/refd-core/repository
          cp -r source/nl.ou.refd.core.repository/target/repository/* docs/refd-core/repository/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

      - name: Show Eclipse log
        if: failure()
        run: |
          cat source/nl.ou.refd.core.tests/target/work/data/.metadata/.log || true
